<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agenda Médica</title>

    <style>
      :root {
        --bs-primary: #0d6efd;
        --bs-primary-hover: #0a58ca;
        --bs-secondary: #6c757d;
        --bs-border-color: #dee2e6;
        --bs-body-bg: #f8f9fa;
        --bs-card-bg: #ffffff;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          sans-serif;
        background-color: var(--bs-body-bg);
        padding: 2rem 0;
        color: #212529;
      }

      .container {
        max-width: 900px;
        margin: auto;
        padding: 0 15px;
      }

      .app-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
        background: #fff;
        padding: 10px 20px;
        border-radius: 50px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        flex-wrap: wrap;
        gap: 10px;
      }

      @media (max-width: 768px) {
        .app-header {
          flex-direction: column;
          border-radius: 20px;
          padding: 15px;
        }
        .nav-capsule {
          width: 100%;
          justify-content: center;
        }
        .btn-secondary {
          width: 100%;
        }
      }

      .nav-capsule {
        display: inline-flex;
        background-color: #e9ecef;
        border-radius: 50px;
        padding: 4px;
      }

      .tab-btn {
        border: none;
        padding: 8px 20px;
        border-radius: 50px;
        transition: all 0.3s ease;
        font-weight: 600;
        color: var(--bs-secondary);
        background: transparent;
        cursor: pointer;
        white-space: nowrap;
      }

      @media (max-width: 576px) {
        .tab-btn {
          padding: 8px 12px;
          font-size: 0.8rem;
        }
      }

      .tab-btn.active {
        background-color: var(--bs-primary);
        color: white;
        box-shadow: 0 2px 5px rgba(13, 110, 253, 0.3);
      }

      .card {
        background: var(--bs-card-bg);
        padding: 1.5rem;
        margin-bottom: 1rem;
        border-radius: 0.375rem;
        border: 1px solid var(--bs-border-color);
        box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
      }

      .row {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 1rem;
      }
      .col-3 {
        grid-column: span 3;
      }
      .col-6 {
        grid-column: span 6;
      }
      @media (max-width: 768px) {
        .col-3,
        .col-6 {
          grid-column: span 12;
        }
      }

      @media (min-width: 769px) {
        .admin-layout .col-3 {
          grid-column: span 6;
        }
      }

      h1 {
        text-align: center;
        color: var(--bs-primary);
        margin-bottom: 2rem;
        font-weight: 700;
      }

      .form-label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        font-size: 0.9rem;
        color: #495057;
      }

      .form-control,
      .form-select {
        display: block;
        width: 100%;
        padding: 0.375rem 0.75rem;
        font-size: 1rem;
        font-weight: 400;
        line-height: 1.5;
        color: #212529;
        background-color: #fff;
        border: 1px solid #ced4da;
        border-radius: 0.375rem;
        transition:
          border-color 0.15s ease-in-out,
          box-shadow 0.15s ease-in-out;
        box-sizing: border-box;
      }

      .form-control:focus {
        border-color: #86b7fe;
        outline: 0;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        cursor: pointer;
        padding: 0.5rem 1rem;
        border-radius: 0.375rem;
        border: 1px solid transparent;
        transition: all 0.15s;
      }
      .btn-primary {
        color: #fff;
        background-color: var(--bs-primary);
        border-color: var(--bs-primary);
        width: 100%;
        margin-top: 1rem;
      }
      .btn-primary:hover {
        opacity: 0.9;
      }
      .btn-secondary {
        color: #fff;
        background-color: var(--bs-secondary);
        border-radius: 50px;
        font-size: 0.9rem;
      }

      fieldset {
        border: 1px solid var(--bs-border-color);
        border-radius: 0.375rem;
        padding: 1.25rem;
        margin-bottom: 1rem;
      }

      legend {
        float: none;
        width: auto;
        padding: 0 0.5rem;
        font-size: 1.2rem;
        font-weight: 600;
        color: var(--bs-primary);
      }

      .form-check {
        margin-bottom: 1.5rem;
      }
      .form-check-label {
        cursor: pointer;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .form-check-input {
        width: 1.1em;
        height: 1.1em;
        cursor: pointer;
      }
      .text-muted {
        font-size: 0.85rem;
        color: #6c757d;
        display: block;
        margin-left: 1.8rem;
        margin-top: -0.25rem;
      }

      .view {
        display: none;
      }
      .view.active {
        display: block;
      }

      .w-100 {
        width: 100%;
      }
      .mt-4 {
        margin-top: 1.5rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Formulario de precarga MoCE</h1>

      <div class="app-header">
        <div class="nav-capsule">
          <button class="tab-btn active" onclick="switchView('hospital')">
            Hospital
          </button>
          <button class="tab-btn" onclick="switchView('operativo')">
            Operativo
          </button>
          <button class="tab-btn" onclick="switchView('administrativo')">
            Administrativo
          </button>
        </div>
        <button class="btn btn-secondary" onclick="descargar()">
          <svg
            width="16"
            height="16"
            fill="currentColor"
            style="margin-right: 8px"
            viewBox="0 0 16 16"
          >
            <path
              d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"
            />
            <path
              d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"
            />
          </svg>
          Descargar CSV
        </button>
      </div>

      <!-- HOSPITAL -->
      <div id="hospital" class="view active">
        <div class="card">
          <div class="row">
            <div class="col-6">
              <label class="form-label">Entidad Federativa</label>
              <select
                id="entidad"
                class="form-select"
                onchange="actualizarUnidades()"
              >
                <option value="">Seleccione Entidad...</option>
              </select>
            </div>
            <div class="col-6">
              <label class="form-label">Nombre Unidad Médica</label>
              <select
                id="unidad"
                class="form-select"
                onchange="autoCompletarHospital()"
              >
                <option value="">Seleccione Unidad...</option>
              </select>
            </div>
            <div class="col-6">
              <label class="form-label">Municipio</label>
              <input
                id="municipio"
                class="form-control"
                placeholder="Autocompletado"
                readonly
              />
            </div>
            <div class="col-6">
              <label class="form-label">CLUES</label>
              <input
                id="clues"
                class="form-control"
                placeholder="Autocompletado"
                readonly
              />
            </div>
            <div class="col-6">
              <label class="form-label">CVE_PRESUPUESTAL</label>
              <input
                id="cve"
                class="form-control"
                placeholder="Escribe a mano"
              />
            </div>
          </div>
        </div>
      </div>

      <!-- REGISTRO -->
      <div id="registro" class="view">
        <div class="card">
          <div class="row">
            <div id="field-clave" class="col-3">
              <label class="form-label">Clave Empleado</label>
              <input id="clave" class="form-control" />
            </div>
            <div class="col-3">
              <label id="lbl-nombre" class="form-label">NOMBRE</label>
              <input id="nombre" class="form-control" />
            </div>
            <div class="col-3">
              <label id="lbl-apellido" class="form-label"
                >APELIDO PATERNO</label
              >
              <input id="apellido" class="form-control" />
            </div>
            <div class="col-3">
              <label id="lbl-apellido2" class="form-label"
                >APELLIDO MATERNO</label
              >
              <input id="apellido2" class="form-control" />
            </div>
            <div id="field-curp" class="col-3" style="display: none">
              <label class="form-label">CURP</label>
              <input
                id="curp"
                maxlength="18"
                class="form-control"
                placeholder="18 caracteres"
              />
            </div>
            <div id="field-titular" class="col-3">
              <label class="form-label">Titular</label>
              <select id="titular" class="form-select">
                <option value="">Seleccionar...</option>
                <option>Sí</option>
                <option>No</option>
              </select>
            </div>
          </div>
        </div>

        <!-- ROLES COMPLETOS -->
        <div id="roles" class="card" style="display: none">
          <fieldset>
            <legend>Roles y Atribuciones</legend>

            <div class="form-check">
              <label class="form-check-label">
                <input
                  type="checkbox"
                  id="role_asistente"
                  class="form-check-input"
                />
                Asistente medica
              </label>
              <span class="text-muted"
                >PERSONAL QUE AYUDE AL DOCTOR A REGISTRAR CITAS, CONSULTAS
                ETC</span
              >
            </div>

            <div class="form-check">
              <label class="form-check-label">
                <input
                  type="checkbox"
                  id="role_admin"
                  class="form-check-input"
                />
                Administrador de catalogo
              </label>
              <span class="text-muted"
                >QUIEN PODRÁ HACER MODIFICACIONES A ESTA PARTE DE CONSULTA
                EXTERNA</span
              >
            </div>

            <div class="form-check">
              <label class="form-check-label">
                <input
                  type="checkbox"
                  id="role_director"
                  class="form-check-input"
                />
                Director
              </label>
              <span class="text-muted">LA DIRECTORA</span>
            </div>

            <div class="form-check">
              <label class="form-check-label">
                <input
                  type="checkbox"
                  id="role_jefe"
                  class="form-check-input"
                />
                Jefes de servicios ( jefe de especialidad)
              </label>
              <span class="text-muted">EL TITULAR DE LA ESPECIALIDAD</span>
            </div>

            <div class="form-check">
              <label class="form-check-label">
                <input
                  type="checkbox"
                  id="role_agenda"
                  class="form-check-input"
                />
                Agenda de citas
              </label>
              <span class="text-muted"
                >PERSONAL QUE MANEJE LA AGENDA DE CITAS</span
              >
            </div>
          </fieldset>
        </div>

        <button
          id="btn-save-op"
          class="btn btn-primary mt-4"
          onclick="guardar()"
        >
          Guardar Personal Operativo
        </button>
        <button
          id="btn-save-admin"
          class="btn btn-primary mt-4"
          style="display: none"
          onclick="guardar()"
        >
          Guardar Personal Administrativo
        </button>
      </div>
    </div>

      window.onload = function () {
        const entidadesUnicas = [...new Set(HOSPITAL_DATA.map((h) => h.ENTIDAD))];
        const selectEntidad = document.getElementById("entidad");
        entidadesUnicas.sort().forEach((ent) => {
          let opt = new Option(ent, ent);
          selectEntidad.add(opt);
        });
      };

      function actualizarUnidades() {
        const entSel = document.getElementById("entidad").value;
        const selectUnidad = document.getElementById("unidad");
        const inputMunicipio = document.getElementById("municipio");
        const inputClues = document.getElementById("clues");
        const inputCve = document.getElementById("cve");

        selectUnidad.innerHTML =
          '<option value="">Seleccione Unidad...</option>';
        inputMunicipio.value = "";
        inputClues.value = "";
        // El CVE_PRESUPUESTAL se llena manualmente por el usuario.

        if (!entSel) return;

        // Solo unidades que correspondan a esa entidad.
        // Value = CLUES (ID único). Texto visible = Nombre de la unidad.
        const unidadesUnicas = [
          ...new Map(
            HOSPITAL_DATA.filter((h) => h.ENTIDAD === entSel).map((h) => [h.CLUES, h])
          ).values(),
        ];

        unidadesUnicas
          .sort((a, b) =>
            (a["NOMBRE DE LA UNIDAD"] || "").localeCompare(b["NOMBRE DE LA UNIDAD"] || "", "es"),
          )
          .forEach((h) => {
            selectUnidad.add(
              new Option(h["NOMBRE DE LA UNIDAD"] || "", h.CLUES)
            );
          });
      }

      // Cuando cambie la unidad médica en la pestaña Hospital, se autocompleta Municipio y CLUES.
      function autoCompletarHospital() {
        const entSel = document.getElementById("entidad").value;
        const unSel = document.getElementById("unidad").value;

        const inputMunicipio = document.getElementById("municipio");
        const inputClues = document.getElementById("clues");

        inputMunicipio.value = "";
        inputClues.value = "";

        if (!entSel || !unSel) return;

        // Nota: tu requerimiento indica que SOLO se llenan listas por base (Entidad + Nombre Unidad)
        // y el CVE_PRESUPUESTAL se queda para llenar solo.
        // Ahora el select #unidad guarda CLUES (unSel), por lo que buscamos por CLUES.
        const h = HOSPITAL_DATA.find(
          (x) => x.CLUES === unSel && x.ENTIDAD === entSel,
        );
        if (!h) return;

        inputMunicipio.value = h.MUNICIPIO;
        inputClues.value = h.CLUES;
      }

      function switchView(v) {
        document
          .querySelectorAll(".tab-btn")
          .forEach((b) => b.classList.remove("active"));

        if (v === "hospital") {
          document
            .querySelectorAll(".view")
            .forEach((v) => v.classList.remove("active"));
          document.getElementById("hospital").classList.add("active");
          document.querySelectorAll(".tab-btn")[0].classList.add("active");
          return;
        }

        tipo = v;
        document
          .querySelectorAll(".view")
          .forEach((v) => v.classList.remove("active"));
        document.getElementById("registro").classList.add("active");
        document
          .querySelectorAll(".tab-btn")
          [v === "operativo" ? 1 : 2].classList.add("active");

        let isOp = v === "operativo";
        let row = document.querySelector("#registro .row");

        if (isOp) row.classList.remove("admin-layout");
        else row.classList.add("admin-layout");

        document.getElementById("field-clave").style.display = isOp
          ? "block"
          : "none";
        document.getElementById("field-titular").style.display = isOp
          ? "block"
          : "none";
        document.getElementById("field-curp").style.display = isOp
          ? "none"
          : "block";
        document.getElementById("roles").style.display = isOp
          ? "none"
          : "block";
        document.getElementById("btn-save-op").style.display = isOp
          ? "flex"
          : "none";
        document.getElementById("btn-save-admin").style.display = isOp
          ? "none"
          : "flex";

        document.getElementById("lbl-nombre").textContent = isOp
          ? "NOMBRE"
          : "Nombre";
        document.getElementById("lbl-apellido").textContent = isOp
          ? "APELIDO PATERNO"
          : "APELLIDO";
        document.getElementById("lbl-apellido2").textContent = isOp
          ? "APELLIDO MATERNO"
          : "2DO APELLIDO";
      }

      function get(id) {
        return document.getElementById(id)?.value || "";
      }
      function check(id) {
        return document.getElementById(id)?.checked ? "Sí" : "No";
      }

      function guardar() {
        if (tipo === "administrativo") {
          if (get("curp").length !== 18) {
            alert("CURP debe tener 18 caracteres");
            return;
          }

          let roles = [
            document.getElementById("role_asistente").checked,
            document.getElementById("role_admin").checked,
            document.getElementById("role_director").checked,
            document.getElementById("role_jefe").checked,
            document.getElementById("role_agenda").checked,
          ];

          if (!roles.includes(true)) {
            alert("Debes seleccionar al menos un rol");
            return;
          }
        }

        registros.push([
          get("entidad"),
          document.getElementById("municipio").value,
          document.getElementById("cve").value,
          document.getElementById("clues").value,
          get("unidad"),
          get("clave"),
          get("nombre"),
          get("apellido"),
          get("apellido2"),
          get("curp"),
          get("titular"),
          check("role_asistente"),
          check("role_admin"),
          check("role_director"),
          check("role_jefe"),
          check("role_agenda"),
        ]);

        alert("Guardado correctamente");
        limpiarCampos();
      }

      function limpiarCampos() {
        const ids = [
          "clave",
          "nombre",
          "apellido",
          "apellido2",
          "curp",
          "titular",
        ];
        ids.forEach((id) => {
          const el = document.getElementById(id);
          if (el.tagName === "SELECT") el.selectedIndex = 0;
          else el.value = "";
        });
        document
          .querySelectorAll('#roles input[type="checkbox"]')
          .forEach((c) => (c.checked = false));
      }

      function descargar() {
        if (registros.length === 0) {
          alert("No hay datos");
          return;
        }
        const headers = [
          "Entidad Federativa",
          "Municipio",
          "CVE_PRESUPUESTAL",
          "CLUES",
          "Nombre Unidad Medica",
          "Clave Empleado",
          "Nombre",
          "Apellido",
          "2do Apellido",
          "CURP",
          "Titular",
          "Asistente medica",
          "Administrador de catalogo",
          "Director",
          "Jefe de servicios",
          "Agenda de citas",
        ];

        let csv =
          headers.join(",") +
          "\n" +
          registros.map((r) => r.join(",")).join("\n");

        let a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob(["\ufeff" + csv]));
        a.download = "agenda.csv";
        a.click();
      }
