<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Excel → JSON</title>

<!-- Librería XLSX -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
  font-family: system-ui;
  background:#f5f5f5;
  padding:20px;
}
.container{
  max-width:800px;
  margin:auto;
}
.card{
  background:white;
  padding:20px;
  border-radius:8px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
textarea{
  width:100%;
  height:300px;
  margin-top:10px;
  font-family:monospace;
}
button{
  padding:10px;
  margin-top:10px;
  width:100%;
  background:#0d6efd;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
</style>

</head>
<body>

<div class="container">
<div class="card">

<h3>Convertir Excel a JSON</h3>

<input type="file" id="archivo" accept=".xlsx, .xls">

<button onclick="copiar()">Copiar JSON</button>

<textarea id="salida" placeholder="Aquí aparecerá el JSON..."></textarea>

</div>
</div>

<script>

document.getElementById('archivo').addEventListener('change', function(e){

  let archivo = e.target.files[0];
  let reader = new FileReader();

  reader.onload = function(e){

    let data = new Uint8Array(e.target.result);
    let workbook = XLSX.read(data, { type: 'array' });

    let hoja = workbook.Sheets[workbook.SheetNames[0]];

    // convierte a JSON usando cabeceras
    let json = XLSX.utils.sheet_to_json(hoja, {
      defval: "" // evita valores undefined
    });

    // formato bonito
    let resultado = JSON.stringify(json, null, 2);

    document.getElementById("salida").value = resultado;
  };

  reader.readAsArrayBuffer(archivo);
});

function copiar(){
  let text = document.getElementById("salida");
  text.select();
  document.execCommand("copy");
  alert("JSON copiado ✅");
}

</script>

</body>
</html>
